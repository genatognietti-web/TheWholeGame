<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { background: var(--bg-canvas); margin: 0; font-family: var(--font-sans); }
  .grid { padding: 24px; display: grid; grid-template-columns: repeat(10, 1fr); gap: 14px 12px; }
  .cell { display:flex; flex-direction:column; align-items:center; gap: 6px; color: var(--ink-700); }
  .cell svg { width: 24px; height: 24px; stroke-width: 1.5; }
  .cell span { font-size: 10px; font-family: var(--font-mono); color: var(--fg-tertiary); }
</style></head>
<body>
<div class="grid" id="g"></div>
<script>
  const list = ['clipboard-list','trophy','users','user-check','calendar','calendar-check','message-circle','mail','bell','shield-check','file-text','check','check-circle-2','x','arrow-right','arrow-up-right','chevron-down','chevron-right','menu','search','sparkles','zap','heart','settings','plus','star','flag','send','smile','clock','dollar-sign','credit-card','phone','map-pin','play','info','alert-triangle','sparkle','paperclip','circle-dot'];
  const g = document.getElementById('g');
  list.forEach(async (n) => {
    const r = await fetch('../assets/icons/' + n + '.svg');
    const svg = await r.text();
    const div = document.createElement('div');
    div.className = 'cell';
    div.innerHTML = svg + '<span>' + n + '</span>';
    g.appendChild(div);
  });
</script>
</body></html>

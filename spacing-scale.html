<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { background: var(--bg-canvas); margin: 0; font-family: var(--font-sans); }
  .card { padding: 24px 28px; }
  .row { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .box { background: var(--blush-200); border-radius: 4px; height: 24px; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); min-width: 80px; }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--fg-body); min-width: 40px; }
</style></head>
<body>
<div class="card">
  <div class="row"><span class="label">space-1</span><div class="box" style="width:4px"></div><span class="val">4px</span></div>
  <div class="row"><span class="label">space-2</span><div class="box" style="width:8px"></div><span class="val">8px</span></div>
  <div class="row"><span class="label">space-3</span><div class="box" style="width:12px"></div><span class="val">12px</span></div>
  <div class="row"><span class="label">space-4</span><div class="box" style="width:16px"></div><span class="val">16px</span></div>
  <div class="row"><span class="label">space-6</span><div class="box" style="width:24px"></div><span class="val">24px</span></div>
  <div class="row"><span class="label">space-8</span><div class="box" style="width:40px"></div><span class="val">40px</span></div>
  <div class="row"><span class="label">space-10</span><div class="box" style="width:64px"></div><span class="val">64px</span></div>
  <div class="row"><span class="label">space-12</span><div class="box" style="width:96px"></div><span class="val">96px</span></div>
  <div class="row" style="margin:0"><span class="label">space-14</span><div class="box" style="width:128px"></div><span class="val">128px</span></div>
</div>
</body></html>

<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { background: var(--bg-canvas); margin: 0; font-family: var(--font-sans); }
  .card { padding: 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px 24px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 13px; font-weight: 500; color: var(--ink-800); }
  .hint { font-size: 12px; color: var(--fg-tertiary); }
  input, select, textarea {
    font: 400 14px/1.4 var(--font-sans); color: var(--ink-900);
    padding: 10px 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--border-default); background: #fff;
    transition: border-color var(--duration-fast), box-shadow var(--duration-fast);
  }
  input:hover, select:hover, textarea:hover { border-color: var(--border-strong); }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: var(--blush-400);
    box-shadow: 0 0 0 3px var(--blush-100);
  }
  .input-error { border-color: var(--rust-500); }
  .input-error:focus { box-shadow: 0 0 0 3px var(--rust-100); }
  .msg-error { font-size: 12px; color: var(--rust-500); display:flex; align-items:center; gap:4px; }
</style></head>
<body>
<div class="card">
  <div class="field">
    <label>Organization name</label>
    <input value="Riverside Youth Soccer" />
    <span class="hint">Shown to parents on invoices.</span>
  </div>
  <div class="field">
    <label>Contact email</label>
    <input placeholder="you@yourleague.org" />
  </div>
  <div class="field">
    <label>Season</label>
    <select><option>Spring 2026</option></select>
  </div>
  <div class="field">
    <label>Registration fee</label>
    <input class="input-error" value="$-12" />
    <span class="msg-error">Fee has to be a positive number.</span>
  </div>
</div>
</body></html>

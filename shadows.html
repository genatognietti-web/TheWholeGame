<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { background: var(--ivory-100); margin: 0; font-family: var(--font-sans); }
  .card { padding: 36px 28px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
  .cell { display:flex; flex-direction:column; align-items:center; gap: 12px; }
  .sq { width: 80px; height: 64px; background: #fff; border-radius: var(--radius-md); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); text-align:center; line-height:1.4; }
  .lbl b { color: var(--fg-body); font-weight:500; }
</style></head>
<body>
<div class="card">
  <div class="cell"><div class="sq" style="box-shadow:var(--shadow-xs)"></div><div class="lbl"><b>xs</b></div></div>
  <div class="cell"><div class="sq" style="box-shadow:var(--shadow-sm)"></div><div class="lbl"><b>sm</b></div></div>
  <div class="cell"><div class="sq" style="box-shadow:var(--shadow-md)"></div><div class="lbl"><b>md</b><br>hover</div></div>
  <div class="cell"><div class="sq" style="box-shadow:var(--shadow-lg)"></div><div class="lbl"><b>lg</b><br>popovers</div></div>
  <div class="cell"><div class="sq" style="box-shadow:var(--shadow-xl)"></div><div class="lbl"><b>xl</b><br>modals</div></div>
</div>
</body></html>

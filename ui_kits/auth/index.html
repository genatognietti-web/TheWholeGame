<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Whole Game — Sign in / Create account</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; min-height: 100vh; font-family: var(--font-sans); background: var(--ivory-50); color: var(--fg-body); }

.auth-shell {
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 100vh;
}

/* Left panel — brand */
.auth-brand {
  background: var(--ink-900);
  padding: 56px 64px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
}
.auth-brand-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(60% 50% at 20% 80%, rgba(198,107,82,0.15) 0%, transparent 60%),
    radial-gradient(50% 40% at 80% 20%, rgba(198,107,82,0.08) 0%, transparent 60%);
  pointer-events: none;
}
.auth-brand-top { position: relative; z-index: 1; }
.auth-brand-middle {
  position: relative; z-index: 1;
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1.2;
  color: var(--ivory-50);
  max-width: 380px;
}
.auth-brand-middle em { font-style: italic; color: var(--blush-300); }
.auth-brand-bottom { position: relative; z-index: 1; }
.auth-brand-tagline {
  font-size: 13px;
  color: var(--clay-300);
  line-height: 1.55;
  max-width: 340px;
}
.auth-brand-docs {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 24px;
}
.auth-doc-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--clay-200);
}
.auth-doc-icon {
  width: 28px; height: 28px;
  border-radius: 6px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  color: var(--blush-300);
  flex-shrink: 0;
}
.auth-doc-icon svg { width: 14px; height: 14px; stroke-width: 1.5; }

/* Right panel — form */
.auth-form-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 56px 64px;
}
.auth-form-inner { width: 100%; max-width: 400px; }

.auth-toggle {
  display: flex;
  background: var(--ivory-200);
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 36px;
  border: 1px solid var(--border-subtle);
}
.auth-toggle button {
  flex: 1;
  background: transparent;
  border: none;
  padding: 9px 16px;
  border-radius: 7px;
  font: 500 14px/1 var(--font-sans);
  color: var(--fg-secondary);
  cursor: pointer;
  transition: background var(--duration-fast), color var(--duration-fast), box-shadow var(--duration-fast);
}
.auth-toggle button.active {
  background: #fff;
  color: var(--ink-900);
  box-shadow: var(--shadow-sm);
}

.auth-heading { font-family: var(--font-display); font-size: 32px; font-weight: 400; letter-spacing: -0.02em; color: var(--ink-900); margin: 0 0 6px; line-height: 1.15; padding-bottom: 0.05em; }
.auth-heading em { font-style: italic; color: var(--blush-500); }
.auth-sub { font-size: 14px; color: var(--fg-secondary); margin: 0 0 28px; line-height: 1.5; }

.auth-field { margin-bottom: 16px; }
.auth-field label {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-800);
  margin-bottom: 6px;
}
.auth-field label a { font-weight: 400; color: var(--blush-500); font-size: 12px; text-decoration: none; }
.auth-field label a:hover { color: var(--rose-500); }
.auth-field input {
  width: 100%;
  font: 400 15px/1.4 var(--font-sans);
  color: var(--ink-900);
  padding: 12px 14px;
  border-radius: 8px;
  border: 1px solid var(--border-default);
  background: #fff;
  transition: border-color .12s, box-shadow .12s;
}
.auth-field input:focus { outline: none; border-color: var(--blush-400); box-shadow: 0 0 0 3px var(--blush-100); }
.auth-field input::placeholder { color: var(--fg-tertiary); }

.auth-name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.auth-name-row .auth-field { margin-bottom: 0; }

.auth-submit {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font: 500 15px/1 var(--font-sans);
  padding: 13px 18px;
  border-radius: 8px;
  border: none;
  background: var(--blush-500);
  color: #fff;
  cursor: pointer;
  margin-top: 8px;
  transition: background .12s, box-shadow .18s, transform .1s;
}
.auth-submit:hover { background: var(--blush-600); box-shadow: var(--shadow-sm); }
.auth-submit:active { transform: scale(0.98); }
.auth-submit svg { width: 16px; height: 16px; }

.auth-divider {
  display: flex; align-items: center; gap: 14px;
  margin: 20px 0;
  font-size: 12px; color: var(--fg-tertiary);
}
.auth-divider::before, .auth-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border-subtle);
}

.auth-disclaimer {
  font-size: 12px;
  color: var(--fg-tertiary);
  text-align: center;
  margin-top: 20px;
  line-height: 1.55;
}
.auth-disclaimer a { color: var(--blush-500); text-decoration: none; }

.auth-switch {
  text-align: center;
  font-size: 13px;
  color: var(--fg-secondary);
  margin-top: 24px;
}
.auth-switch a { color: var(--blush-500); text-decoration: none; font-weight: 500; }
.auth-switch a:hover { color: var(--rose-500); }

/* Nudge — small AI voice moment */
.auth-nudge {
  background: var(--blush-50);
  border: 1px solid var(--blush-100);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 13px;
  color: var(--ink-800);
  line-height: 1.5;
  margin-bottom: 24px;
}
.auth-nudge em { font-style: italic; font-family: var(--font-display); font-weight: 500; color: var(--blush-600); font-size: 14.5px; }

@media (max-width: 768px) {
  .auth-shell { grid-template-columns: 1fr; }
  .auth-brand { display: none; }
  .auth-form-panel { padding: 40px 24px; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
function AuthPage() {
  const [mode, setMode] = React.useState('signin'); // 'signin' | 'create'
  const [done, setDone] = React.useState(false);

  return (
    <div className="auth-shell">
      <BrandPanel />
      <div className="auth-form-panel">
        <div className="auth-form-inner">

          <div className="auth-toggle">
            <button className={mode === 'signin' ? 'active' : ''} onClick={() => { setMode('signin'); setDone(false); }}>Sign in</button>
            <button className={mode === 'create' ? 'active' : ''} onClick={() => { setMode('create'); setDone(false); }}>Create account</button>
          </div>

          {mode === 'signin' && !done && <SignInForm onSubmit={() => setDone(true)} switchMode={() => setMode('create')} />}
          {mode === 'create' && !done && <CreateForm onSubmit={() => setDone(true)} switchMode={() => setMode('signin')} />}
          {done && <SuccessState mode={mode} reset={() => setDone(false)} />}
        </div>
      </div>
    </div>
  );
}

function BrandPanel() {
  const docs = [
    { label: 'Coach Onboarding Checklist' },
    { label: 'Parent Code of Conduct' },
    { label: 'Compliance Framework' },
    { label: 'Incident Report Template' },
  ];
  return (
    <div className="auth-brand">
      <div className="auth-brand-bg" />
      <div className="auth-brand-top">
        <img src="../../assets/logo/wordmark-ondark.svg" height="28" alt="The Whole Game" />
      </div>
      <div className="auth-brand-middle">
        Turn chaos into culture.<br/>
        <em>One decision at a time.</em>
      </div>
      <div className="auth-brand-bottom">
        <p className="auth-brand-tagline">
          Nine ready-to-use HR and compliance documents for youth sports organizations. Download, customize, done.
        </p>
        <div className="auth-brand-docs">
          {docs.map((d, i) => (
            <div key={i} className="auth-doc-row">
              <div className="auth-doc-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z"/>
                  <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/>
                </svg>
              </div>
              {d.label}
            </div>
          ))}
          <div className="auth-doc-row" style={{color:'var(--clay-500)', fontStyle:'italic'}}>+ 5 more per bundle</div>
        </div>
      </div>
    </div>
  );
}

function SignInForm({ onSubmit, switchMode }) {
  return (
    <>
      <h1 className="auth-heading">Welcome <em>back.</em></h1>
      <p className="auth-sub">Sign in to access your documents.</p>

      <div className="auth-field">
        <label>Email</label>
        <input type="email" placeholder="you@yourleague.org" autoFocus />
      </div>
      <div className="auth-field">
        <label>
          Password
          <a href="#">Forgot password?</a>
        </label>
        <input type="password" placeholder="········" />
      </div>

      <button className="auth-submit" onClick={onSubmit}>
        Sign in
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </button>

      <p className="auth-switch">Don't have an account? <a href="#" onClick={e => { e.preventDefault(); switchMode(); }}>Create one →</a></p>
    </>
  );
}

function CreateForm({ onSubmit, switchMode }) {
  return (
    <>
      <h1 className="auth-heading">Let's get you <em>set up.</em></h1>
      <p className="auth-sub">Create your account to purchase and access your bundles.</p>

      <div className="auth-nudge">
        <em>Takes about a minute.</em> No credit card required to create an account — purchase when you're ready.
      </div>

      <div className="auth-name-row">
        <div className="auth-field"><label>First name</label><input placeholder="Jess" /></div>
        <div className="auth-field"><label>Last name</label><input placeholder="Rivera" /></div>
      </div>
      <div className="auth-field"><label>Email</label><input type="email" placeholder="you@yourleague.org" /></div>
      <div className="auth-field"><label>Password</label><input type="password" placeholder="8+ characters" /></div>
      <div className="auth-field">
        <label>Organization name <span style={{fontWeight:400, color:'var(--fg-tertiary)'}}>· optional</span></label>
        <input placeholder="Riverside Youth Soccer" />
      </div>

      <button className="auth-submit" onClick={onSubmit}>
        Create account
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </button>

      <p className="auth-disclaimer">
        By creating an account you agree to our <a href="#">terms of service</a> and <a href="#">privacy policy</a>.
      </p>
      <p className="auth-switch">Already have an account? <a href="#" onClick={e => { e.preventDefault(); switchMode(); }}>Sign in →</a></p>
    </>
  );
}

function SuccessState({ mode, reset }) {
  return (
    <div style={{textAlign:'center', padding:'24px 0'}}>
      <div style={{width:56, height:56, borderRadius:'50%', background:'var(--sage-50)', border:'1px solid var(--sage-100)', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 20px'}}>
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--sage-600)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width="24" height="24"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
      <h2 style={{fontFamily:'var(--font-display)', fontSize:28, fontWeight:400, letterSpacing:'-0.02em', color:'var(--ink-900)', margin:'0 0 10px'}}>
        {mode === 'create' ? <>Account <em style={{fontStyle:'italic', color:'var(--blush-500)'}}>created.</em></> : <>You're <em style={{fontStyle:'italic', color:'var(--blush-500)'}}>in.</em></>}
      </h2>
      <p style={{fontSize:14, color:'var(--fg-secondary)', lineHeight:1.55, margin:'0 0 28px'}}>
        {mode === 'create'
          ? "We've sent a confirmation to your email. Check your inbox to verify, then you're ready to choose your bundle."
          : "Redirecting you to your documents…"}
      </p>
      {mode === 'create' && (
        <a href="../onboarding/index.html" style={{display:'inline-flex', alignItems:'center', gap:8, background:'var(--blush-500)', color:'#fff', fontWeight:500, fontSize:14, padding:'12px 20px', borderRadius:8, textDecoration:'none'}}>
          Choose your bundle
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" width="16" height="16"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </a>
      )}
      <p style={{marginTop:20}}><button onClick={reset} style={{background:'none', border:'none', color:'var(--blush-500)', fontSize:13, cursor:'pointer', fontFamily:'var(--font-sans)'}}>← Back</button></p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AuthPage />);
</script>
</body>
</html>

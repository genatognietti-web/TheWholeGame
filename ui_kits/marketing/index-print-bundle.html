<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Whole Game — Marketing Site</title>

<!-- ext-resource-dependency: logo wordmark -->
<meta name="ext-resource-dependency" content="../../assets/logo/wordmark.svg" data-resource-id="wordmarkSvg" />

<!-- ext-resource-dependency: hero photos (Unsplash) -->
<meta name="ext-resource-dependency" content="https://images.unsplash.com/photo-1529516548873-9ce57c8f155e?w=400&h=280&auto=format&fit=crop&q=70" data-resource-id="photo1" />
<meta name="ext-resource-dependency" content="https://images.unsplash.com/photo-1560272564-c83b66b1ad12?w=400&h=280&auto=format&fit=crop&q=70" data-resource-id="photo2" />
<meta name="ext-resource-dependency" content="https://images.unsplash.com/photo-1517649763962-0c623066013b?w=400&h=280&auto=format&fit=crop&q=70" data-resource-id="photo3" />

<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="kit.css">

<template id="__bundler_thumbnail" data-bg-color="#2e1915">
  <svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Dark hero band -->
    <rect width="800" height="500" fill="#2e1915"/>
    <!-- Rose accent circle / mark -->
    <circle cx="400" cy="200" r="60" fill="none" stroke="#c66b52" stroke-width="3"/>
    <path d="M 340 200 A 45 45 0 0 1 460 200" fill="none" stroke="#fbf1ec" stroke-width="3"/>
    <circle cx="400" cy="200" r="8" fill="#c66b52"/>
    <!-- Wordmark placeholder lines -->
    <rect x="200" y="290" width="400" height="14" rx="4" fill="#c66b52" opacity="0.8"/>
    <rect x="240" y="316" width="320" height="10" rx="3" fill="#8c6249" opacity="0.6"/>
    <!-- Trust dots -->
    <rect x="260" y="360" width="80" height="6" rx="3" fill="#523129"/>
    <rect x="360" y="360" width="80" height="6" rx="3" fill="#523129"/>
    <rect x="460" y="360" width="80" height="6" rx="3" fill="#523129"/>
  </svg>
</template>

<style>
  /* ── Print overrides ──────────────────────────────── */
  @page { size: letter portrait; margin: 0; }

  @media print {
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    .twg-nav, .twg-waitlist, .twg-waitlist-confirmed,
    .twg-hero-cta, .twg-bundle-toggle, .twg-pricing-features,
    .twg-step-arrow { display: none !important; }
    body { padding-top: 0 !important; }
    .twg-hero         { break-before: page; break-inside: avoid; }
    .twg-section      { break-before: page; break-inside: avoid; }
    .twg-section-muted { break-before: page; break-inside: avoid; }
    .twg-section-cta  { break-before: page; break-inside: avoid; }
    .twg-footer       { break-before: page; break-inside: avoid; }
    .twg-bundle-item, .twg-step-card, .twg-pricing-card, .twg-full-stack { break-inside: avoid; }
    .twg-hero, section, .twg-hero-photos { overflow: visible !important; }
    .twg-hero-trust { margin-top: 12px; }
    .twg-hero-inner { padding-top: 32px; padding-bottom: 32px; }
    .twg-hero-photo { height: 120px !important; }
    .twg-pricing-grid { grid-template-columns: 1fr 1fr 1fr !important; gap: 12px !important; }
    .twg-pricing-features { display: flex !important; }
    .twg-full-stack { margin-top: 16px; }
  }
  @media screen {
    .print-hint {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      background: var(--ink-900); color: var(--ivory-50);
      font: 500 13px/1 var(--font-sans); padding: 10px 16px;
      border-radius: 8px; cursor: pointer; border: none;
      box-shadow: var(--shadow-md); display: flex; align-items: center; gap: 8px;
    }
  }
  @media print { .print-hint { display: none; } }
</style>
</head>
<body>
<button class="print-hint" onclick="window.print()">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
  Save as PDF
</button>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
// ── Nav ──────────────────────────────────────────────
function Nav() {
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <nav className={`twg-nav ${scrolled ? 'scrolled' : ''}`}>
      <div className="twg-nav-inner">
        <a href="#" className="twg-nav-brand">
          <img src={window.__resources && window.__resources.wordmarkSvg || '../../assets/logo/wordmark.svg'} alt="The Whole Game" height="28" />
        </a>
        <div className="twg-nav-links">
          <a href="#how-it-works">Product</a>
          <a href="#bundles-pricing">Pricing</a>
          <a href="#about">About</a>
        </div>
        <div className="twg-nav-cta">
          <a href="#" className="twg-btn twg-btn-ghost twg-btn-sm">Sign in</a>
          <a href="#hero-waitlist" className="twg-btn twg-btn-primary twg-btn-sm">Join the waitlist</a>
        </div>
      </div>
    </nav>
  );
}

// ── Hero ─────────────────────────────────────────────
const HERO_PHOTOS = ['photo1','photo2','photo3'];

function Hero() {
  return (
    <section className="twg-hero" id="hero-waitlist">
      <div className="twg-hero-bg" aria-hidden="true"></div>
      <div className="twg-container twg-hero-inner">
        <div className="twg-eyebrow">Youth sports HR &amp; compliance templates</div>
        <h1 className="twg-display-1">
          Turn chaos into culture.<br/>
          <em>One decision at a time.</em>
        </h1>
        <p className="twg-lede">
          Ready-to-use document bundles for youth sports organizations. Coach HR, parent conduct,
          compliance systems — built for the real situations you actually face. Download, customize, done.
        </p>
        <WaitlistForm />
        <div className="twg-hero-trust">
          <span className="twg-caption">No HR experience required</span>
          <span className="twg-dot" aria-hidden="true">·</span>
          <strong>Instant download via Google Drive</strong>
          <span className="twg-dot" aria-hidden="true">·</span>
          <strong>From $97</strong>
        </div>
      </div>
      <div className="twg-hero-photos" aria-hidden="true">
        <div className="twg-hero-photo-strip">
          {HERO_PHOTOS.map((id, i) => (
            <div key={i} className="twg-hero-photo" style={{
              backgroundImage: `url(${window.__resources && window.__resources[id] || ''})`
            }} />
          ))}
        </div>
      </div>
    </section>
  );
}

function WaitlistForm() {
  const [email, setEmail] = React.useState('');
  const [done, setDone] = React.useState(false);
  const submit = (e) => { e.preventDefault(); if (email) setDone(true); };
  if (done) return <WaitlistConfirmed email={email} />;
  return (
    <form className="twg-waitlist" onSubmit={submit}>
      <input type="email" required placeholder="your@leagueemail.org" value={email} onChange={e => setEmail(e.target.value)} />
      <button type="submit" className="twg-btn twg-btn-primary twg-btn-lg">
        Join the waitlist
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </button>
    </form>
  );
}

function WaitlistConfirmed({ email }) {
  return (
    <div className="twg-waitlist-confirmed">
      <div className="twg-waitlist-confirmed-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width="22" height="22"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
      <div className="twg-waitlist-confirmed-body">
        <strong>You're on the list.</strong>
        <p>We'll email <span>{email}</span> when bundles go live at the end of May. No credit card, no commitment — just first access.</p>
        <div className="twg-waitlist-confirmed-expect">
          <div className="twg-waitlist-confirmed-row">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" width="14" height="14"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            <span>Launching end of May 2026</span>
          </div>
          <div className="twg-waitlist-confirmed-row">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" width="14" height="14"><path d="M20 6L9 17l-5-5"/></svg>
            <span>Waitlist members get 24-hour early access</span>
          </div>
          <div className="twg-waitlist-confirmed-row">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" width="14" height="14"><path d="M20 6L9 17l-5-5"/></svg>
            <span>Check your inbox — a confirmation is on its way</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Features ─────────────────────────────────────────
function Features() {
  const steps = [
    { num: '01', title: 'Create your account', body: "Sign up in under a minute. Free to browse — purchase when you're ready." },
    { num: '02', title: 'Choose your bundle', body: 'Pick the bundle that fits where your organization is right now. Buy one or get all three.' },
    { num: '03', title: 'Download and customize', body: 'Instant access to a Google Drive folder with all nine documents. Add your org name and details — done.' },
  ];
  return (
    <section className="twg-section twg-section-muted" id="how-it-works">
      <div className="twg-container">
        <div className="twg-section-head">
          <div className="twg-eyebrow">How it works</div>
          <h2 className="twg-display-2">Three steps. <em>Done in an afternoon.</em></h2>
          <p className="twg-lede">No HR team required. No setup call. Download, open a doc, fill in your details — and you have an HR foundation.</p>
        </div>
        <div className="twg-steps-row">
          {steps.map((s, i) => (
            <div className="twg-step-card" key={i}>
              <div className="twg-step-num">{s.num}</div>
              <h3 className="twg-feature-title">{s.title}</h3>
              <p className="twg-feature-body">{s.body}</p>
              {i < steps.length - 1 && <div className="twg-step-arrow" aria-hidden="true">→</div>}
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

// ── Pricing ───────────────────────────────────────────
function scrollToWaitlist(e) {
  e.preventDefault();
  const el = document.getElementById('hero-waitlist');
  if (el) el.scrollIntoView({ block: 'start' });
  setTimeout(() => {
    const input = document.querySelector('.twg-waitlist input');
    if (input) { input.focus(); input.classList.add('twg-waitlist-pulse'); setTimeout(() => input.classList.remove('twg-waitlist-pulse'), 1000); }
  }, 400);
}

function Pricing() {
  const tiers = [
    { num:'01', name:'Coach HR Starter', badge:'Most popular', price:'$97', desc:'Onboard, manage, and document your coaching staff before anything goes wrong.', body:"One undocumented incident, one unclear expectation — that's how small problems become big ones. A complete HR foundation for managing your coaching staff from day one. No HR experience required.", featured:true, bestFor:'Club directors and league admins managing 1 or more coaches.', items:['Coach Onboarding Checklist','Coach Code of Conduct','Communication & Chain of Command Guide','Discipline & Incident Management System','Incident Report Template','Written Warning Template','Youth Safety & Boundaries Guideline','Organizational Escalation Path','Implementation Guide (5-step rollout)'], cta:'Get Bundle 1 — $97' },
    { num:'02', name:'Parent & Athlete Conduct', badge:null, price:'$122', desc:'Stop managing sideline chaos. Start managing expectations.', body:"Parent conflicts, sideline blowups, athletes who don't know the rules — these aren't just uncomfortable, they're liability risks. Set expectations upfront and handle issues consistently.", featured:false, bestFor:'Any org that has dealt with difficult parents or behavior issues.', items:['Parent Code of Conduct','Athlete Expectations Framework','Communication Structure Guide','Escalation & Conflict Resolution System','Incident Reporting System','Behavior Violation Response Framework (4 levels)','Safety & Liability Protection Guidelines','Organizational Authority Structure','Implementation Guide'], cta:'Get Bundle 2 — $122' },
    { num:'03', name:'Compliance & Incident System', badge:null, price:'$147', desc:'Your compliance backbone — built for the real risks youth sports organizations face.', body:"Most orgs operate without a compliance framework. And it's fine — until it isn't. A safety incident, a misconduct allegation, a parent threatening legal action. Be ready before it happens.", featured:false, bestFor:'Growing or established orgs, or anyone who has experienced an incident.', items:['Compliance Framework Overview','Incident Classification System (4 severity levels)','Full Incident Reporting System','Compliance Escalation Chain (4-step process)','Youth Safety Compliance Standards','Jurisdictional Compliance Integration','Compliance Audit Requirements','Organizational Liability Protection Guide','Implementation Guide'], cta:'Get Bundle 3 — $147' },
  ];
  return (
    <section className="twg-section" id="bundles-pricing">
      <div className="twg-container">
        <div className="twg-section-head">
          <div className="twg-eyebrow">Bundles &amp; pricing</div>
          <h2 className="twg-display-2">Nine documents. <em>One afternoon.</em></h2>
          <p className="twg-lede">Each bundle is a one-time purchase. Download, add your org's details, and you own them. No subscription, no renewal, no consultant required.</p>
          <div className="twg-launch-notice">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" width="16" height="16"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            Bundles launch end of May 2026 — <a href="#hero-waitlist" onClick={scrollToWaitlist}>join the waitlist</a> for 24-hour early access.
          </div>
        </div>
        <div className="twg-pricing-grid">
          {tiers.map((t, i) => <PricingCard key={i} {...t} />)}
        </div>
        <div className="twg-full-stack">
          <div className="twg-full-stack-text">
            <span className="twg-eyebrow" style={{color:'var(--blush-300)'}}>Best value</span>
            <h3 style={{fontFamily:'var(--font-display)',fontSize:32,fontWeight:400,letterSpacing:'-0.02em',margin:'8px 0 10px',lineHeight:1.2,color:'var(--ivory-50)'}}>All three bundles. <em style={{fontStyle:'italic',color:'var(--blush-300)'}}>27 documents. One system.</em></h3>
            <p style={{fontSize:14.5,color:'var(--clay-200)',maxWidth:520,lineHeight:1.6,margin:0}}>Staff management, conduct standards, and compliance — all connected. Everything you need to build a complete HR foundation from scratch.</p>
          </div>
          <div className="twg-full-stack-cta">
            <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:16}}>
              <span style={{fontFamily:'var(--font-display)',fontSize:52,fontWeight:500,letterSpacing:'-0.03em',color:'var(--ivory-50)',lineHeight:1}}>$297</span>
              <span style={{fontSize:13,fontWeight:600,color:'var(--blush-300)',background:'rgba(198,107,82,0.18)',padding:'5px 12px',borderRadius:999}}>Save $69</span>
            </div>
            <a href="#hero-waitlist" onClick={scrollToWaitlist} className="twg-btn twg-btn-primary twg-btn-lg">Join the waitlist to get early access <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg></a>
            <p style={{fontSize:12,color:'var(--clay-400)',margin:'10px 0 0',textAlign:'center'}}>Instant Google Drive access · Customize for your org</p>
          </div>
        </div>
      </div>
    </section>
  );
}

function PricingCard({ num, name, badge, price, desc, body, featured, bestFor, items, cta }) {
  const [open, setOpen] = React.useState(false);
  return (
    <article className={`twg-pricing-card ${featured ? 'featured' : ''}`}>
      <div className="twg-pricing-head">
        <div style={{display:'flex',flexDirection:'column',gap:4}}>
          <span style={{fontFamily:'var(--font-mono)',fontSize:10,color:featured?'var(--blush-400)':'var(--fg-tertiary)',letterSpacing:'0.1em'}}>{num}</span>
          <h3>{name}</h3>
        </div>
        {badge && <span className="twg-pill twg-pill-accent">{badge}</span>}
      </div>
      <div className="twg-pricing-price"><span className="amt">{price}</span><span className="unit">one-time · 9 docs</span></div>
      <p style={{fontSize:14.5,fontWeight:500,color:'var(--ink-800)',lineHeight:1.4,margin:'0 0 8px'}}>{desc}</p>
      <p className="twg-pricing-desc">{body}</p>
      <p style={{fontSize:12.5,color:'var(--fg-tertiary)',margin:'0 0 14px',lineHeight:1.45}}><strong style={{color:'var(--ink-700)',fontWeight:500}}>Best for:</strong> {bestFor}</p>
      <a href="#hero-waitlist" onClick={scrollToWaitlist} className={`twg-btn ${featured?'twg-btn-primary':'twg-btn-secondary'} twg-btn-block`}>{cta}</a>
      <div style={{borderTop:'1px solid var(--border-subtle)',marginTop:16,paddingTop:14}}>
        <button className="twg-bundle-toggle" onClick={() => setOpen(o => !o)}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" width="13" height="13" style={{transform:open?'rotate(180deg)':'none',transition:'transform .18s'}}><path d="M6 9l6 6 6-6"/></svg>
          {open ? 'Hide' : 'See all'} 9 documents
        </button>
        {open && <ul className="twg-pricing-features" style={{marginTop:12}}>{items.map((f,i)=><li key={i}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"/></svg>{f}</li>)}</ul>}
      </div>
    </article>
  );
}

// ── CTA ───────────────────────────────────────────────
function CTA() {
  return (
    <section className="twg-section twg-section-cta">
      <div className="twg-container twg-cta-inner">
        <h2 className="twg-display-2" style={{color:'var(--ivory-50)'}}>Build your HR foundation <em style={{color:'var(--blush-300)'}}>before you need it.</em></h2>
        <p className="twg-lede" style={{color:'var(--clay-200)'}}>The best time to put these in place is before something goes wrong. Nine documents. One afternoon. Done.</p>
        <div className="twg-hero-cta" style={{justifyContent:'center',marginTop:32}}>
          <a href="#bundles-pricing" className="twg-btn twg-btn-primary twg-btn-lg">See the bundles</a>
          <a href="#hero-waitlist" className="twg-btn twg-btn-ghost-dark twg-btn-lg">Join the waitlist →</a>
        </div>
      </div>
    </section>
  );
}

// ── Footer ────────────────────────────────────────────
function Footer() {
  return (
    <footer className="twg-footer">
      <div className="twg-container twg-footer-inner">
        <div className="twg-footer-brand">
          <img src={window.__resources && window.__resources.wordmarkSvg || '../../assets/logo/wordmark.svg'} alt="The Whole Game" height="28" />
          <p>The operations layer for youth sports. Less logistics. More game.</p>
        </div>
        <div className="twg-footer-cols">
          <div>
            <h5>Product</h5>
            <a href="#">Coach HR Starter</a>
            <a href="#">Parent &amp; Athlete Conduct</a>
            <a href="#">Compliance &amp; Incident System</a>
            <a href="#">Full Stack Bundle</a>
          </div>
          <div>
            <h5>Company</h5>
            <a href="#">About</a>
            <a href="#">Contact</a>
          </div>
          <div>
            <h5>Support</h5>
            <a href="#">Help center</a>
            <a href="#">Status</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
          </div>
        </div>
      </div>
      <div className="twg-footer-bottom">
        <div className="twg-container">
          <span>© 2026 The Whole Game, Inc.</span>
          <span>Built for the people holding it all together.</span>
        </div>
      </div>
    </footer>
  );
}

// ── App ───────────────────────────────────────────────
function App() {
  return (
    <>
      <Nav />
      <Hero />
      <Features />
      <Pricing />
      <CTA />
      <Footer />
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);

document.fonts.ready.then(() => { setTimeout(() => window.print(), 500); });
</script>
</body>
</html>

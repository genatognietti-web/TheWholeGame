<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { background: var(--bg-canvas); margin: 0; }
  .card { padding: 28px 32px; }
  .row { display: grid; grid-template-columns: 84px 1fr; align-items: baseline; gap: 18px; padding: 10px 0; border-bottom: 1px solid var(--border-subtle); }
  .row:last-child { border-bottom: none; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); letter-spacing: 0.02em; }
  .specimen { font-family: var(--font-display); color: var(--fg-primary); font-weight: 400; line-height: 1.0; letter-spacing: -0.025em; }
</style></head>
<body>
<div class="card">
  <div class="row"><div class="meta">72 / 400<br>display-1</div><div class="specimen" style="font-size:60px">Less logistics. <em>More game.</em></div></div>
  <div class="row"><div class="meta">48 / 400<br>display-2</div><div class="specimen" style="font-size:40px">Built for the people <em>holding it all together.</em></div></div>
  <div class="row"><div class="meta">30 / 500<br>h3</div><div class="specimen" style="font-size:26px;font-weight:500">One system. Every season.</div></div>
</div>
</body></html>

<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { background: var(--bg-canvas); margin: 0; }
  .card { padding: 24px; font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; margin-bottom: 10px; }
  .sw { aspect-ratio: 1; border-radius: var(--radius-sm); padding: 6px 8px; display: flex; flex-direction: column; justify-content: flex-end; font-size: 10px; font-weight: 500; border: 1px solid rgba(45,30,25,0.04); }
  .n { opacity: 0.65; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; }
  .hex { font-family: var(--font-mono); font-size: 9.5px; }
  .title { font-weight: 600; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-secondary); margin: 0 0 8px; display: flex; align-items: center; gap: 8px; }
  .title em { font-style: normal; font-family: var(--font-display); font-weight: 400; letter-spacing: -0.01em; text-transform: none; color: var(--blush-500); font-size: 14px; }
</style></head>
<body>
<div class="card">
  <div class="title">Blush <em>— signature</em></div>
  <div class="row">
    <div class="sw" style="background:#fbeee8;color:#221813"><span class="n">50</span><span class="hex">#fbeee8</span></div>
    <div class="sw" style="background:#f6dcd2;color:#221813"><span class="n">100</span><span class="hex">#f6dcd2</span></div>
    <div class="sw" style="background:#eec3b2;color:#221813"><span class="n">200</span><span class="hex">#eec3b2</span></div>
    <div class="sw" style="background:#e4a590;color:#221813"><span class="n">300</span><span class="hex">#e4a590</span></div>
    <div class="sw" style="background:#d7866c;color:#fbf7f2"><span class="n">400</span><span class="hex">#d7866c</span></div>
    <div class="sw" style="background:#c66b52;color:#fbf7f2"><span class="n">500</span><span class="hex">#c66b52</span></div>
    <div class="sw" style="background:#a8523d;color:#fbf7f2"><span class="n">600</span><span class="hex">#a8523d</span></div>
    <div class="sw" style="background:#853f2e;color:#fbf7f2"><span class="n">700</span><span class="hex">#853f2e</span></div>
  </div>
  <div class="title" style="margin-top:12px">Rose <em>— deeper accent</em></div>
  <div class="row" style="grid-template-columns:repeat(6,1fr)">
    <div class="sw" style="background:#f2d8d0;color:#221813"><span class="n">100</span><span class="hex">#f2d8d0</span></div>
    <div class="sw" style="background:#e5b3a6;color:#221813"><span class="n">200</span><span class="hex">#e5b3a6</span></div>
    <div class="sw" style="background:#d28e7d;color:#221813"><span class="n">300</span><span class="hex">#d28e7d</span></div>
    <div class="sw" style="background:#b66853;color:#fbf7f2"><span class="n">400</span><span class="hex">#b66853</span></div>
    <div class="sw" style="background:#95493a;color:#fbf7f2"><span class="n">500</span><span class="hex">#95493a</span></div>
    <div class="sw" style="background:#75362a;color:#fbf7f2"><span class="n">600</span><span class="hex">#75362a</span></div>
  </div>
</div>
</body></html>

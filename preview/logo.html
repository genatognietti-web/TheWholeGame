<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { background: var(--ivory-100); margin: 0; font-family: var(--font-sans); }
  .wrap { padding: 32px; display: flex; align-items: center; gap: 32px; }
  .panel { background: #fff; border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 28px 32px; flex: 1; }
  .panel.dark { background: var(--ink-900); border-color: var(--ink-800); }
  .meta { font-size: 11px; color: var(--fg-tertiary); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 14px; font-weight: 600; }
  img { display: block; }  .panel.dark .meta { color: var(--clay-300); }
</style></head>
<body>
<div class="wrap">
  <div class="panel">
    <div class="meta">On ivory</div>
    <img src="../assets/logo/wordmark.svg" width="320" alt="The Whole Game">
  </div>
  <div class="panel dark">
    <div class="meta">On ink</div>
    <img src="../assets/logo/wordmark-ondark.svg" width="320" alt="The Whole Game">
  </div>
  <div class="panel" style="flex:0 0 auto; text-align:center">
    <div class="meta">Mark</div>
    <img src="../assets/logo/mark.svg" width="72" alt="mark">
  </div>
</div>
</body></html>

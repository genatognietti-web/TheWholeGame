<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { background: var(--bg-canvas); margin: 0; }
  .card { padding: 22px 24px; font-family: var(--font-sans); }
  .row { display: grid; gap: 8px; margin-bottom: 10px; }
  .sw { aspect-ratio: 2.2/1; border-radius: var(--radius-sm); padding: 8px 10px; display: flex; flex-direction: column; justify-content: space-between; font-size: 10px; font-weight: 500; border: 1px solid rgba(45,30,25,0.04); }
  .n { opacity: 0.65; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; }
  .hex { font-family: var(--font-mono); font-size: 9.5px; }
  .title { font-weight: 600; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-secondary); margin: 0 0 10px; display:flex; align-items:baseline; gap:10px; }
  .title em { font-style: normal; font-family: var(--font-display); font-weight: 400; letter-spacing: -0.01em; text-transform: none; color: var(--blush-500); font-size: 13px; }
</style></head>
<body>
<div class="card">
  <div class="title">Ivory <em>— warm paper, now pink-cast</em></div>
  <div class="row" style="grid-template-columns:repeat(6,1fr)">
    <div class="sw" style="background:#fdf6f1;color:#2e1915"><span class="n">50</span><span class="hex">#fdf6f1</span></div>
    <div class="sw" style="background:#faece4;color:#2e1915"><span class="n">100</span><span class="hex">#faece4</span></div>
    <div class="sw" style="background:#f5ddd0;color:#2e1915"><span class="n">200</span><span class="hex">#f5ddd0</span></div>
    <div class="sw" style="background:#eecaba;color:#2e1915"><span class="n">300</span><span class="hex">#eecaba</span></div>
    <div class="sw" style="background:#e4b3a0;color:#2e1915"><span class="n">400</span><span class="hex">#e4b3a0</span></div>
    <div class="sw" style="background:#d59682;color:#fff7f2"><span class="n">500</span><span class="hex">#d59682</span></div>
  </div>
  <div class="title" style="margin-top:8px">Clay <em>— pink-toned neutrals for borders + surfaces</em></div>
  <div class="row" style="grid-template-columns:repeat(8,1fr)">
    <div class="sw" style="background:#f6ebe4;color:#2e1915"><span class="n">50</span><span class="hex">#f6ebe4</span></div>
    <div class="sw" style="background:#ecd7cb;color:#2e1915"><span class="n">100</span><span class="hex">#ecd7cb</span></div>
    <div class="sw" style="background:#debdaa;color:#2e1915"><span class="n">200</span><span class="hex">#debdaa</span></div>
    <div class="sw" style="background:#c89e85;color:#2e1915"><span class="n">300</span><span class="hex">#c89e85</span></div>
    <div class="sw" style="background:#ae7f63;color:#fff7f2"><span class="n">400</span><span class="hex">#ae7f63</span></div>
    <div class="sw" style="background:#8c6249;color:#fff7f2"><span class="n">500</span><span class="hex">#8c6249</span></div>
    <div class="sw" style="background:#6d4935;color:#fff7f2"><span class="n">600</span><span class="hex">#6d4935</span></div>
    <div class="sw" style="background:#4d3124;color:#fff7f2"><span class="n">700</span><span class="hex">#4d3124</span></div>
  </div>
</div>
</body></html>
